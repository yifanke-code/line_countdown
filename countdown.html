<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒數計時</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('c:/tmp2/20180723184850417_3.jpg') center/cover no-repeat;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .input-section {
            margin-bottom: 40px;
        }
        label {
            color: #fff;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        input {
            font-size: 24px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
        }
        .countdown {
            color: #fff;
            font-size: 72px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
        }
        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-section">
            <label>設定目標時間</label><br>
            <input type="datetime-local" id="targetTime">
            <br>
            <button class="btn" onclick="startCountdown()">開始倒數</button>
        </div>
        <div class="countdown" id="display">00:00:00:00</div>
    </div>

    <script>
        let interval;

        function startCountdown() {
            const target = document.getElementById('targetTime').value;
            if (!target) {
                alert('請選擇目標時間');
                return;
            }

            const targetDate = new Date(target).getTime();

            clearInterval(interval);
            interval = setInterval(() => {
                const now = new Date().getTime();
                const diff = targetDate - now;

                if (diff <= 0) {
                    document.getElementById('display').textContent = '時間到！';
                    clearInterval(interval);
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('display').textContent =
                    `${String(days).padStart(2, '0')}天 ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
